  <line x1="0" y1="40" x2="1180" y2="40" stroke="#D0D7DE" stroke-width="1.5"/>
  <circle cx="25" cy="20" r="6" fill="#FF5F56"/>
  <circle cx="45" cy="20" r="6" fill="#FFBD2E"/>
  <circle cx="65" cy="20" r="6" fill="#27C93F"/>
  <text x="590" y="24" fill="#57606A" font-family="monospace" font-size="12" text-anchor="middle">shoaib@ai-research ~ ./profile.sh --live</text>

  <!-- ========================================== -->
  <!-- LEFT PANE: VISUAL MAP (PROFILE PICTURE)    -->
  <!-- ========================================== -->
  <rect x="30" y="70" width="450" height="520" rx="6" fill="none" stroke="#0969DA" stroke-opacity="0.3" stroke-width="1"/>
