<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" width="100%" height="100%">
  <defs>
    <clipPath id="avatar-clip">
      <circle cx="255" cy="320" r="140" />
    </clipPath>
    <!-- Glow filter for scanline -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background and Outer Terminal Box -->
  <rect width="1180" height="620" rx="10" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>
  
  <!-- Top Window Controls and Title Bar -->
  <line x1="0" y1="40" x2="1180" y2="40" stroke="#30363D" stroke-width="1.5"/>
  <circle cx="25" cy="20" r="6" fill="#FF5F56"/>
  <circle cx="45" cy="20" r="6" fill="#FFBD2E"/>
  <circle cx="65" cy="20" r="6" fill="#27C93F"/>
  <text x="590" y="24" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">shoaib@ai-research ~ ./profile.sh --live</text>

  <!-- ========================================== -->
  <!-- LEFT PANE: VISUAL MAP (PROFILE PICTURE)    -->
  <!-- ========================================== -->
  <rect x="30" y="70" width="450" height="520" rx="6" fill="none" stroke="#1F6FEB" stroke-opacity="0.2" stroke-width="1"/>
  <text x="50" y="95" fill="#58A6FF" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">VISUAL MAP</text>
  
  <!-- Animated Scanline over the Visual Map pane -->
  <line x1="30" y1="70" x2="480" y2="70" stroke="#1F6FEB" stroke-width="1.5" opacity="0.5" filter="url(#glow)">
    <animate attributeName="y1" values="70;590;70" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="70;590;70" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Floating wrapper for profile picture -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,6; 0,0" dur="4s" repeatCount="indefinite" easing="ease-in-out"/>
    
    <!-- Outer glowing tech ring -->
    <circle cx="255" cy="320" r="146" fill="none" stroke="#1F6FEB" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="4,6">
       <!-- Rotate animation for the dashed ring -->
       <animateTransform attributeName="transform" type="rotate" values="0 255 320; 360 255 320" dur="20s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Your actual GitHub Profile Picture -->
    <image x="115" y="180" width="280" height="280" preserveAspectRatio="xMidYMid slice" href="https://github.com/mdshoaibuddinchanda.png" clip-path="url(#avatar-clip)" />
  </g>

  <!-- Pulsing Status Text -->
  <g>
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    <text x="255" y="500" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">&gt; STATUS: ONLINE</text>
    <circle cx="190" cy="497" r="3" fill="#27C93F"/>
  </g>

  <!-- ========================================== -->
  <!-- RIGHT PANE: SYSTEM INFO & METRICS          -->
  <!-- ========================================== -->
  <rect x="500" y="70" width="650" height="520" rx="6" fill="none" stroke="#1F6FEB" stroke-opacity="0.2" stroke-width="1"/>
  <text x="520" y="95" fill="#58A6FF" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">SYSTEM INFO</text>
  
  <!-- Terminal Prompt Header -->
  <text x="520" y="130" fill="#58A6FF" font-family="monospace" font-size="13" font-weight="bold">shoaib@ai-research ~ %</text>
  <!-- Blinking Cursor -->
  <rect x="705" y="118" width="8" height="15" fill="#58A6FF">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Sequential Reveal for Data Blocks -->
  <g font-family="monospace" font-size="13">
    <!-- Row 1 -->
    <g opacity="0"><animate attributeName="opacity" to="1" begin="0.4s" fill="freeze"/>
      <text x="520" y="165" fill="#58A6FF">Subject:</text>
      <text x="670" y="165" fill="#C9D1D9">Md Shoaib Uddin Chanda</text>
    </g>
    
    <!-- Row 2 -->
    <g opacity="0"><animate attributeName="opacity" to="1" begin="0.8s" fill="freeze"/>
      <text x="520" y="195" fill="#58A6FF">Role:</text>
      <text x="670" y="195" fill="#C9D1D9">Applied ML Researcher &amp; Engineer</text>
    </g>

    <!-- Row 3 -->
    <g opacity="0"><animate attributeName="opacity" to="1" begin="1.2s" fill="freeze"/>
      <text x="520" y="225" fill="#58A6FF">Origin:</text>
      <text x="670" y="225" fill="#C9D1D9">Hyderabad, Telangana, India</text>
    </g>

    <!-- Row 4 -->
    <g opacity="0"><animate attributeName="opacity" to="1" begin="1.6s" fill="freeze"/>
      <text x="520" y="255" fill="#58A6FF">Education:</text>
      <text x="670" y="255" fill="#C9D1D9">B.Tech AI &amp; ML, CGPA 8.1/10</text>
    </g>

    <!-- Row 5 -->
    <g opacity="0"><animate attributeName="opacity" to="1" begin="2.0s" fill="freeze"/>
      <text x="520" y="285" fill="#58A6FF">Status:</text>
      <text x="670" y="285" fill="#C9D1D9">Building • Researching • Publishing</text>
    </g>

    <!-- Row 6 -->
    <g opacity="0"><animate attributeName="opacity" to="1" begin="2.4s" fill="freeze"/>
      <text x="520" y="315" fill="#58A6FF">ToolChain:</text>
      <text x="670" y="315" fill="#C9D1D9">Git, Linux, Docker, MLflow, LaTeX</text>
    </g>

    <!-- Technical Skills Block -->
    <g opacity="0"><animate attributeName="opacity" to="1" begin="2.8s" fill="freeze"/>
      <text x="520" y="360" fill="#58A6FF">Core.Lang:</text>
      <text x="670" y="360" fill="#C9D1D9">Python, SQL, C/C++, Java</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" to="1" begin="3.2s" fill="freeze"/>
      <text x="520" y="390" fill="#58A6FF">Core.ML/DL:</text>
      <text x="670" y="390" fill="#C9D1D9">PyTorch, OpenCV, XGBoost, YOLOv8</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" to="1" begin="3.6s" fill="freeze"/>
      <text x="520" y="420" fill="#58A6FF">Core.Backend:</text>
      <text x="670" y="420" fill="#C9D1D9">FastAPI, PostgreSQL, Redis, Celery</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" to="1" begin="4.0s" fill="freeze"/>
      <text x="520" y="450" fill="#58A6FF">Core.Focus:</text>
      <text x="670" y="450" fill="#C9D1D9">Robust ML, Tabular AI, Computer Vision</text>
    </g>

    <!-- Contact Block -->
    <g opacity="0"><animate attributeName="opacity" to="1" begin="4.4s" fill="freeze"/>
      <text x="520" y="495" fill="#58A6FF">Contact</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" to="1" begin="4.6s" fill="freeze"/>
      <text x="520" y="525" fill="#58A6FF">Grid.Mail:</text>
      <text x="670" y="525" fill="#C9D1D9">mdshoaibuddinchanda@gmail.com</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" to="1" begin="4.8s" fill="freeze"/>
      <text x="520" y="555" fill="#58A6FF">Grid.LinkedIn:</text>
      <text x="670" y="555" fill="#C9D1D9">in/mdshoaibuddinchanda</text>
    </g>
  </g>
</svg>
