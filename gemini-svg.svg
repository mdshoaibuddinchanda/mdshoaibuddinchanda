<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
<defs>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/><stop offset="50%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#070B14"/><stop offset="100%" stop-color="#030509"/>
  </radialGradient>
  <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/><stop offset="80%" stop-color="#22D3EE" stop-opacity="0.05"/><stop offset="90%" stop-color="#A5F3FC" stop-opacity="0.5"/><stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
  </linearGradient>
  <pattern id="dotPattern" width="5" height="5" patternUnits="userSpaceOnUse"><circle cx="2.5" cy="2.5" r="1.8" fill="white"/></pattern>
  <mask id="scanMask">
    <rect width="1180" height="610" fill="black" /><rect x="0" y="-150" width="600" height="150" fill="white" opacity="0.9"><animateTransform attributeName="transform" type="translate" values="0,-50; 0,600; 0,-50" dur="4s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.8; 1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></rect>
  </mask>
  <filter id="neonGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .key { font-family: 'Courier New', monospace; font-size: 15px; fill: #22D3EE; font-weight: bold; }
    .val { font-family: 'Courier New', monospace; font-size: 15px; fill: #F3F4F6; }
    .head { font-family: 'Courier New', monospace; font-size: 17px; fill: #8B5CF6; font-weight: bold; }
    .accent { font-family: 'Courier New', monospace; font-size: 14px; fill: #10B981; font-weight: bold; }
    .label { font-family: 'Courier New', monospace; font-size: 12px; fill: #6B7280; }
  </style>
</defs>
<rect width="1180" height="610" rx="16" fill="url(#bgGlow)"/>
<g transform="translate(0, 44)">
